services:
  backend:
    build: ./backend
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ARISTOTLE_API_KEY=${ARISTOTLE_API_KEY:-}
      - LEAN_WORKER_URL=http://lean-worker:9000
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:5173}
      - AUDIT_LOG_PATH=/app/policy_data/audit.log
    volumes:
      - policy_data:/app/policy_data
    networks:
      - default
      - coolify
    depends_on:
      lean-worker:
        condition: service_healthy
    ports:
      - "8002:8000"
    restart: unless-stopped

  lean-worker:
    build: ./lean-worker
    expose:
      - "9000"
    volumes:
      - policy_data:/app/policy_data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  policy_data:

networks:
  coolify:
    external: true